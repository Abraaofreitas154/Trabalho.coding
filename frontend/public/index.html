<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#ff4757">
  <meta name="description" content="Aplicativo PWA para gerenciamento de exercícios de musculação">
  <title>Muscle Fit - Gerenciador de Treinos</title>

  <!-- PWA -->
  <link rel="manifest" href="/manifest.json">
  <link rel="apple-touch-icon" href="/icons/icon.svg">

  <!-- Estilos -->
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <div class="app-container">
    <!-- Header -->
    <header class="header">
      <h1>💪 Muscle Fit</h1>
      <p>Gerencie seus exercícios de musculação</p>
    </header>

    <!-- Stats -->
    <div class="stats-bar" id="statsBar">
      <div class="stat-card">
        <div class="number" id="totalExercicios">0</div>
        <div class="label">Exercícios</div>
      </div>
      <div class="stat-card">
        <div class="number" id="totalGrupos">0</div>
        <div class="label">Grupos</div>
      </div>
      <div class="stat-card">
        <div class="number" id="totalAtivos">0</div>
        <div class="label">Ativos</div>
      </div>
    </div>

    <!-- Filtros -->
    <div class="filters">
      <input type="text" id="buscaInput" placeholder="🔍 Buscar exercício...">
      <select id="grupoFilter">
        <option value="">Todos os grupos</option>
      </select>
      <select id="nivelFilter">
        <option value="">Todos os níveis</option>
        <option value="Iniciante">Iniciante</option>
        <option value="Intermediário">Intermediário</option>
        <option value="Avançado">Avançado</option>
      </select>
      <button class="btn btn-primary" onclick="abrirModal()">
        <span>+</span> Novo Exercício
      </button>
    </div>

    <!-- Lista -->
    <div id="listaExercicios">
      <div class="loading">
        <div class="spinner"></div>
        <p>Carregando exercícios...</p>
      </div>
    </div>

    <!-- Modal -->
    <div class="modal-overlay" id="modal">
      <div class="modal">
        <div class="modal-header">
          <h2 id="modalTitulo">Novo Exercício</h2>
          <button class="modal-close" onclick="fecharModal()">&times;</button>
        </div>
        <div class="modal-body">
          <form id="formExercicio">
            <input type="hidden" id="exercicioId">

            <div class="form-group">
              <label for="nome">Nome do Exercício *</label>
              <input type="text" id="nome" required maxlength="100" placeholder="Ex: Supino Reto">
            </div>

            <div class="form-row">
              <div class="form-group">
                <label for="grupoMuscular">Grupo Muscular *</label>
                <select id="grupoMuscular" required>
                  <option value="">Selecione</option>
                  <option value="Peito">Peito</option>
                  <option value="Costas">Costas</option>
                  <option value="Pernas">Pernas</option>
                  <option value="Ombros">Ombros</option>
                  <option value="Braços">Braços</option>
                  <option value="Abdômen">Abdômen</option>
                  <option value="Glúteos">Glúteos</option>
                  <option value="Panturrilha">Panturrilha</option>
                </select>
              </div>
              <div class="form-group">
                <label for="nivelDificuldade">Nível *</label>
                <select id="nivelDificuldade" required>
                  <option value="Iniciante">Iniciante</option>
                  <option value="Intermediário">Intermediário</option>
                  <option value="Avançado">Avançado</option>
                </select>
              </div>
            </div>

            <div class="form-row">
              <div class="form-group">
                <label for="series">Séries *</label>
                <input type="number" id="series" required min="1" max="20" value="3">
              </div>
              <div class="form-group">
                <label for="repeticoes">Repetições *</label>
                <input type="number" id="repeticoes" required min="1" max="100" value="10">
              </div>
              <div class="form-group">
                <label for="carga">Carga (kg)</label>
                <input type="number" id="carga" min="0" value="0">
              </div>
            </div>

            <div class="form-group">
              <label for="descricao">Descrição</label>
              <textarea id="descricao" maxlength="500" placeholder="Descrição técnica do exercício..."></textarea>
            </div>

            <div class="form-group">
              <label for="imagemUrl">URL da Imagem</label>
              <input type="url" id="imagemUrl" placeholder="https://exemplo.com/imagem.jpg">
            </div>
          </form>
        </div>
        <div class="modal-footer">
          <button class="btn btn-secondary" onclick="fecharModal()">Cancelar</button>
          <button class="btn btn-success" onclick="salvarExercicio()">Salvar</button>
        </div>
      </div>
    </div>

    <!-- Toast Container -->
    <div class="toast-container" id="toastContainer"></div>

    <!-- Install Button -->
    <button class="btn btn-primary install-btn" id="installBtn" onclick="instalarApp()">
      📲 Instalar App
    </button>
  </div>

  <!-- Scripts -->
  <script src="/app.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js')
        .then(reg => console.log('✅ SW registrado:', reg.scope))
        .catch(err => console.log('❌ SW erro:', err));
    }
  </script>
</body>
</html>
